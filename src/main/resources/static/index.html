<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chat WebSocket</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 30px auto; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto;
                    padding: 10px; margin-bottom: 10px; border-radius: 6px; }
        .msg { margin: 4px 0; }
        .systeme { color: #888; font-style: italic; }
        input, button { padding: 8px; font-size: 14px; }
        #contenu { width: 70%; }
    </style>
</head>
<body>
    <h2>💬 Chat en temps réel</h2>

    <div id="zone-connexion">
        <input id="pseudo" placeholder="Votre pseudo" />
        <button onclick="connecter()">Rejoindre</button>
    </div>

    <div id="zone-chat" style="display:none;">
        <div id="messages"></div>
        <input id="contenu" placeholder="Votre message..." />
        <button onclick="envoyer()">Envoyer</button>
    </div>

    <!-- Librairies CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>

    <script>
        let stompClient = null;
        let pseudo = null;

        function connecter() {
            pseudo = document.getElementById('pseudo').value.trim();
            if (!pseudo) return alert("Entrez un pseudo");

            // 1. Création du client STOMP via SockJS
            const socket = new SockJS('/ws');
            stompClient = new StompJs.Client({
                webSocketFactory: () => socket
            });

            // 2. À la connexion réussie
            stompClient.onConnect = () => {
                document.getElementById('zone-connexion').style.display = 'none';
                document.getElementById('zone-chat').style.display = 'block';

                // 3. S'abonner au canal public
                stompClient.subscribe('/topic/public', (msg) => {
                    afficher(JSON.parse(msg.body));
                });

                // 4. Annoncer son arrivée
                stompClient.publish({
                    destination: '/app/chat.rejoindre',
                    body: JSON.stringify({ expediteur: pseudo, type: 'ARRIVEE' })
                });
            };

            stompClient.activate();  // lance la connexion
        }

        function envoyer() {
            const input = document.getElementById('contenu');
            const contenu = input.value.trim();
            if (!contenu || !stompClient) return;

            stompClient.publish({
                destination: '/app/chat.envoyer',
                body: JSON.stringify({
                    expediteur: pseudo,
                    contenu: contenu,
                    type: 'CHAT'
                })
            });
            input.value = '';
        }

        function afficher(message) {
            const div = document.createElement('div');
            div.className = 'msg';
            if (message.type === 'ARRIVEE' || message.type === 'DEPART') {
                div.className += ' systeme';
                div.textContent = message.contenu;
            } else {
                div.innerHTML = '<strong>' + message.expediteur + '</strong> : ' + message.contenu;
            }
            const zone = document.getElementById('messages');
            zone.appendChild(div);
            zone.scrollTop = zone.scrollHeight;
        }

        // Envoyer avec la touche Entrée
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.getElementById('zone-chat').style.display !== 'none') {
                envoyer();
            }
        });
    </script>
</body>
</html>
